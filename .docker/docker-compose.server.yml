services:
  # Gluetun
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun-stack
    hostname: gluetun
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.ip_unprivileged_port_start: 1024
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: always
    ports:
      - "10025:6881"
      - "10026:8085" # qbittorrent
      - "10028:8989" # Sonarr
      - "10029:9696" # Prowlarr
      - "10030:8686" # Lidarr
      - "10032:8000" # Gluetun web
      - "10033:7878" # Radarr
      - "10034:8191" # FlareSolverr
      - "10035:6881" # qBittorrent torrenting
      - "10036:8080" # SABnzbd
    volumes:
      - /root/gluetun:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=mullvad
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${VPN_COUNTRY}
      - SERVER_CITIES=${VPN_CITIES}
      - FIREWALL_VPN_INPUT_PORTS=49427
      - TZ=${TIMEZONE}
      - UPDATER_PERIOD=24h
      - HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH=./config.toml
      # HEALTHCHECK CONFIGURATION
      - HEALTH_TARGET_ADDRESS=cloudflare.com:443
      - HEALTH_VPN_DURATION_INITIAL=6s
      - HEALTH_VPN_DURATION_ADDITION=5s
      - HEALTH_SUCCESS_WAIT_DURATION=5s
      - HEALTH_SERVER_ADDRESS=127.0.0.1:9999

  # qbittorrent
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent
    container_name: qbittorrent-stack
    network_mode: service:gluetun
    environment:
      - PUID=0
      - PGID=0
      - TZ=${TIMEZONE}
      - WEBUI_PORT=8085
      - TORRENTING_PORT=6881
    volumes:
      - /root/qbittorrent:/config
      - /mnt/lvm/Downloads:/downloads
      - /root/VueTorrent:/config/VueTorrent
    depends_on:
      - gluetun
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085"]
      interval: 1m
      timeout: 10s
      retries: 3

  # SABnzbd
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    network_mode: service:gluetun
    environment:
      - PUID=0
      - PGID=0
      - TZ=${TIMEZONE}
    volumes:
      - /root/sabnzbd/config:/config
      - /mnt/lvm/Downloads:/downloads
    restart: always

  # Sonarr
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr-stack
    network_mode: service:gluetun
    environment:
      - PUID=0
      - PGID=0
      - TZ=${TIMEZONE}
    volumes:
      - /root/sonarr/data:/config
      - /mnt/lvm/Downloads:/downloads
      - /mnt/lvm/Series:/multimedia/serie
    depends_on:
      - gluetun
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989"]
      interval: 1m
      timeout: 10s
      retries: 3

  # Radarr
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: service:gluetun
    environment:
      - PUID=0
      - PGID=0
      - TZ=${TIMEZONE}
    volumes:
      - /root/radarr/config:/config
      - /mnt/lvm/Downloads:/downloads
      - /mnt/lvm/Series:/multimedia/serie
      - /mnt/lvm/Film:/multimedia/film
    depends_on:
      - gluetun
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878"]
      interval: 1m
      timeout: 10s
      retries: 3

  # Lidarr
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    network_mode: service:gluetun
    environment:
      - PUID=0
      - PGID=0
      - TZ=${TIMEZONE}
    volumes:
      - /root/lidarr/config:/config
      - /mnt/lvm/Downloads:/downloads
      - /mnt/lvm/Music:/multimedia/music
    depends_on:
      - gluetun
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8686"]
      interval: 1m
      timeout: 10s
      retries: 3

  # FlareSolverr
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr-stack
    network_mode: service:gluetun
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TIMEZONE}
    depends_on:
      - gluetun
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/health"]
      interval: 1m
      timeout: 10s
      retries: 3

  # Umami
  umami:
    image: ghcr.io/umami-software/umami:latest
    container_name: umami
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${UMAMI_USER}:${UMAMI_PASSWORD}@umami_db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      umami_db:
        condition: service_healthy
    init: true
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:3000/api/heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Postgres for Umami
  umami_db:
    image: postgres:15-alpine
    container_name: umami_db
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: ${UMAMI_USER}
      POSTGRES_PASSWORD: ${UMAMI_PASSWORD}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks: {}
volumes:
  umami-db-data:
